{% extends 'base.html' %}

{% block title %}AsistPro - Página No Encontrada{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 animate-fade-in" id="error404Container">
    <div class="col-12 col-md-6 text-center">
        <div class="display-1 fw-bold text-danger mb-3" id="error404Code">
            <i class="bi bi-exclamation-octagon-fill"></i> 404
        </div>
        <h2 class="fw-bold text-dark mb-3" id="error404Title">Página No Encontrada</h2>
        <p class="text-muted mb-4" id="error404Message">
            Lo sentimos, la dirección a la que intenta acceder no existe o ha sido movida.
        </p>
        <a href="{{ url_for('index') }}" class="btn btn-primary-custom" id="btnBackToHome" data-testid="back-to-home-btn">
            <i class="bi bi-house-door-fill me-1"></i> Ir al Inicio
        </a>
    </div>
</div>
{% endblock %}
